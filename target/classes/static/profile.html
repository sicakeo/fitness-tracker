<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User Profile</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="nav-container">
        <button class="hamburger" id="hamburgerBtn">
            <span></span>
            <span></span>
            <span></span>
        </button>

        <nav class="nav-menu" id="navMenu">
            <ul id="nav-list">
                <li><a href="/">Home</a></li>
                <li><a href="/about">About Us</a></li>
                <li id="toolDropdown" class="dropdown-parent">
                    <a href="#">Tools</a>
                    <ul id="toolDropdownMenu">
                        <li><a href="/bmi-calculator">BMI Calculator</a></li>
                        <li><a href="/bmr-calculator">BMR Calculator</a></li>
                        <li><a href="/tdee-calculator">TDEE Calculator</a></li>
                    </ul>
                </li>
                <li><span id="signOutLink" class="logout-text">Sign out</span></li>
            </ul>
        </nav>
    </div>
    
    
    <main id = "profileContainer" class = "profile-container">
        <section id = "profileCardEdit" class = "profile-card" style = "display: none;">
            <form id = "profileForm" class = "profile-form">
                <div class = "form-group">
                    <label for = "name"> Name: </label>
                    <input id = "name" type = "text">
                </div>

                <div class = "form-group">
                    <label for = "age"> Age:</label>
                    <input id = "age" type = "number">
                </div>

                <div class = "form-group">
                    <label for = "gender"> Gender: </label>
                    <select name = "gender" id = "gender">
                        <option value = "M">Male</option>
                        <option value = "F">Female</option>
                    </select>
                </div>

                <div id="bodyInformation" class="body-information">
                    <label>Body Information</label>
                    <select id="unitSelect">
                        <option value="metric">Metric</option>
                        <option value="standard">Standard</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="height">Height:</label>
                    <input id="height" type="number">
                    <span id="heightUnit">lbs</span> 
                </div>

                <div class="form-group">
                    <label for="weight">Weight:</label>
                    <input id="weight" type="number">
                    <span id="weightUnit">lbs</span>
                </div>

                <div class="form-group">
                    <label for="bmr">BMR:</label>
                    <input id="bmr" type="number" readonly>
                    <span id="bmrUnit">kcal/day</span>
                    <button id="calculateBMRBtn" type="button">Calculate BMR</button>
                </div>

                <div class=""form-group>
                    <label for="activityLevel">Activity Level:</label>
                    <select id="activityLevel">
                        <option value="" disabled selected>Select your activity level</option>
                        <option value="1.2">Sedentary (little or no exercise)</option>
                        <option value="1.375">Lightly active (light exercise/sports 1-3 days/week)</option>
                        <option value="1.55">Moderately active (moderate exercise/sports 3-5 days/week)</option>
                        <option value="1.725">Active (hard exercise/sports 6-7 days a week)</option>
                        <option value="1.9">Very active (very hard exercise/sports & physical job or 2x training)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="tdee">TDEE:</label>
                    <input id="tdee" type="number" readonly>
                    <span id="tdeeUnit">kcal/day</span>
                    <button id="calculateTDEEBtn" type="button">Calculate TDEE</button>
                </div>
                
                <div class="form-group">
                <label for="fitnessGoal">Fitness Goal:</label>
                <select id="fitnessGoal" name="fitnessGoal" required>
                    <option value="" disabled selected>-- Select Your Goal --</option>
                    <option value="MILD_LOSS">Mild Weight Loss (~0.25 kg/week)</option>
                    <option value="WEIGHT_LOSS">Weight Loss (~0.5 kg/week)</option>
                    <option value="MAINTAIN">Maintain Current Weight</option>
                    <option value="WEIGHT_GAIN">Muscle Building / Weight Gain (~0.25 kg/week)</option>
                    <option value="HEAVY_GAIN">Aggressive Weight Gain (~0.5 kg/week)</option>
                </select>
                </div>

                <div class = "form-group">
                    <button id = "saveProfileBtn" type = "button"> Save Profile </button>   
                </div>
            </form>
        </section>

        <section id = "profileCardDisplay" class = "profile-card">
            <h2 id = "displayName"> Name: </h2>
            <p id = "displayAge"> Age: </p>
            <p id = "displayGender"> Gender: </p>
            <p id = "displayHeight"> Height: </p>
            <p id = "displayWeight"> Weight: </p>
            <p id = "displayActivityLevel"> Activity Level: </p>
            <p id = "displayTDEE"> TDEE: </p>
            <p id = "displayFitnessGoal"> Fitness Goal: </p>
            <div class = "form-group">
                <button id = "editProfileBtn" type = "button"> Edit Profile </button>   
            </div>
        </section>
    </main>
    <script type="module" src = "js/navbar.js"></script>
    <script type="module" src="js/profile.js"></script>
</body>
</html>
