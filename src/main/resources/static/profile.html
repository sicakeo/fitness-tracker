<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User Profile</title>
</head>
<body>
    <div class = "nav-container">
        <nav class ="nav-menu">
            <ul id="nav-list" class="nav-menu">
                <li><a href="/home">Home</a></li>
                <li><a href="/profile">User Profile</a></li>
                <li><a href="/bmi-calculator">BMI Calculator</a></li>
                <li><a href="/bmr-calculator">BMR Calculator</a></li>
                <li><span id="signOutLink" class="logout-text">Sign out</span></li>
            </ul>
        </nav>
    </div>
    
    <main id = "profileContainer" class = "profile-container">
        <section id = "profileCardEdit" class = "profile-card" style = "display: none;">
            <form id = "profileForm" class = "profile-form">
                <div class = "form-group">
                    <label for = "name"> Name: </label>
                    <input id = "name" type = "text">
                </div>

                <div class = "form-group">
                    <label for = "age"> Age:</label>
                    <input id = "age" type = "number">
                </div>

                <div class = "form-group">
                    <label for = "gender"> Gender: </label>
                    <select name = "gender" id = "gender">
                        <option value = "M">Male</option>
                        <option value = "F">Female</option>
                    </select>
                </div>

                <div id="bodyInformation" class="body-information">
                    <label>Body Information</label>
                    <select id="unitSelect">
                        <option value="standard">Standard</option>
                        <option value="metric">Metric</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="height">Height:</label>
                    <input id="height" type="number">
                    <span id="heightUnit">lbs</span> 
                </div>

                <div class="form-group">
                    <label for="weight">Weight:</label>
                    <input id="weight" type="number">
                    <span id="weightUnit">lbs</span>
                </div>

                <div class="form-group">
                    <label for="bmr">BMR:</label>
                    <input id="bmr" type="number" readonly>
                    <span id="bmrUnit">kcal/day</span>
                    <h3 id="bmrMessage" class="bmr-message">
                        Don't know your BMR?  <div id="bmrStartBtn">
                            <button type="button">Start Now</button>
                        </div>
                    </h3>
                </div>

                <div class = "form-group">
                    <button id = "saveProfileBtn" type = "button"> Save Profile </button>   
                </div>
            </form>
        </section>

        <section id = "profileCardDisplay" class = "profile-card">
            <h2 id = "displayName"> Name: </h2>
            <p id = "displayAge"> Age: </p>
            <p id = "displayGender"> Gender: </p>
            <p id = "displayHeight"> Height: </p>
            <p id = "displayWeight"> Weight: </p>
            <p id = "displayBMR"> BMR: </p>
            <div class = "form-group">
                <button id = "editProfileBtn" type = "button"> Edit Profile </button>   
            </div>
        </section>
    </main>
    <script type="module" src="js/profile.js"></script>
</body>
</html>
