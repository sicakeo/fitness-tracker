<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BMI Calculator</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/bmi.css">
</head>
<body>
      <div class="nav-container">
        <button class="hamburger" id="hamburgerBtn">
            <span></span>
            <span></span>
            <span></span>
        </button>

        <nav class="nav-menu" id="navMenu">
            <ul id="nav-list">
                <li><a href="/">Home</a></li>
                <li><a href="/about">About Us</a></li>
            
                <li id="toolDropdown" class="dropdown-parent">
                    <a href="#">Tools</a>
                    <ul id="toolDropdownMenu">
                        <li><a href="/bmi-calculator">BMI Calculator</a></li>
                        <li><a href="/bmr-calculator">BMR Calculator</a></li>
                        <li><a href="/tdee-calculator">TDEE Calculator</a></li>
                    </ul>
                </li>
            </ul>
        </nav>

        <div id="nav-right">
            <div id="loginBtn">
                <a href="/login">Login</a>
            </div>
            <div id="registerBtn">
                <a href="/register">Signup</a>
            </div>
        </div>
      </div>

    <div class = "bmi-card">
      <div class = "bmi-header">
        <h2>BMI Calculator</h2>
      </div>

      <div class = "bmi-content">
        <div class = "toggle">
          <button type = "submit" id = "standard-btn" style ="background-color: green">Standard</button>
          <button type = "submit" id = "metric-btn" style = "background-color: gray">Metric</button>
        </div>

        <form id="bmi-form" novalidate>
          <div class="form-row">
            <label class="row-label">Height</label>

            <div id="standard-height-group" class="input-group-row">
              <input type="number" id="feet" inputmode="numeric" required>
              <span class="unit-label">Feet</span>

              <input type="number" id="inches" inputmode="numeric" required>
              <span class="unit-label">Inches</span>
            </div>

            <div id="metric-height-group" class="input-group-row hidden" style = "display: none">
              <input type="number" id="cm" inputmode="numeric" required>
              <span class="unit-label">Cm</span>
            </div>
          </div>

          <div class="form-row">
            <label class="row-label">Weight</label>

            <div class="input-group-row">
              <div id = "standard-weight-group" class="input-group-row">
                <input type="number" id="lbs" inputmode="decimal" required>
                <span id="standard-weight-unit" class="unit-label">Pounds</span>
              </div>

              <div id = "metric-weight-group" class="input-group-row hidden"  style = "display: none">
                <input type="number" id="kg" inputmode="decimal" required>
                <span id="metric-weight-unit" class="unit-label">Kilogram</span>
              </div>
            </div>
          </div>
          <button type = "submit" id = "submit">Calculate</button>

        </form>

        <div class = "bmi-result" >
          <h2>Your BMI Result:</h2>
          <lable id = "resultMessage">BMI = 0.0 kg/m<sup>2</sup></lable>
        </div>

        <div class="bmi-scale-container">
            <div class="bmi-scale-track">
                <div class="bmi-scale-fill" id="bmiScaleFill">
                <div class="bmi-scale-pointer">➔</div>
            </div>
        </div>
    </div>
  <script type="module" src = "js/navbar.js"></script>
  <script type="module" src = "js/bmi-calculator.js"></script>
</body>
</html>
