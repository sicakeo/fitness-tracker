<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name = "viewport" content = "width = device-width, initial-scale = 1" />
    <title>Fitness Tracker Application</title>
     <link rel="stylesheet" href="css/styles.css">
     <link rel="stylesheet" href="css/home.css">
</head>
<body>
    <div class="nav-container">
        <button class="hamburger" id="hamburgerBtn">
            <span></span>
            <span></span>
            <span></span>
        </button>

        <nav class="nav-menu" id="navMenu">     
            <ul id="nav-list">
                <li><a href="/">Home</a></li>
                <li><a href="/about">About Us</a></li>
                <li><a href="/profile">User Profile</a></li>
                <li id="toolDropdown" class="dropdown-parent">
                    <a href="#">Tools</a>
                    <ul id="toolDropdownMenu">
                        <li><a href="/bmi-calculator">BMI Calculator</a></li>
                        <li><a href="/bmr-calculator">BMR Calculator</a></li>
                        <li><a href="/tdee-calculator">TDEE Calculator</a></li>
                    </ul>
                </li>
                <li>
                    <div id="logoutBtn" class="nav-right">
                        <span id="signOutLink" class="logout-text">Sign out</span>
                    </div>
                </li>
            </ul>
        </nav>
    </div>

    <div class = "wrapper">
        <div class = "calorie-ring-container">
            <div class = "calorie-ring">
                <svg class="progress-ring" width="200" height="200">
                    <circle class="inner" cx="100" cy="100" r="80" stroke-width="16"></circle>
                    <circle id="calorieFillCircle" class="outer" cx="100" cy="100" r="80" stroke-width="16"></circle>
                </svg>

                <div class="ring-text-center">
                    <span id="netCaloriesDisplay" data-target="0"></span>
                    <small> / <span id="targetCaloriesDisplay">2200</span> kcal</small>
                </div>
            </div>
        </div>
    </div>

    <div class="start-container">
        <h2><span id="startWorkoutBtn" class="startWorkoutBtn">Start a Workout</span></h2>
    </div>

    <div id="workoutModal" class="modal-overlay hidden">
        <div class="modal-card">
            <h2>Log a New Workout</h2>
            <form id="workoutForm" novalidate>
                <div class="form-group">
                    <label for="workoutType">Exercise Type:</label>
                    <select id="workoutType" required>
                        <option value="" disabled selected>Select an exercise</option>
                        <option value="Running">Running</option>
                        <option value="Cycling">Cycling</option>
                        <option value="Swimming">Swimming</option>
                        <option value="Weightlifting">Weightlifting</option>
                        <option value="Yoga">Yoga</option>
                        <option value="HIIT">HIIT</option>
                    </select>
                </div>
                <div class="form-group" id="distanceGroup" hidden>
                    <label for="distance">Distance (km):</label>
                    <input type="number" id="distance" min="0" step="0.01">
                </div>
                <div class="form-group" id="nameGroup" hidden>
                    <label for="name">Exercise Name:</label>
                    <input type="text" id="name" required>
                </div>
                <div class="form-group" id="repsGroup" hidden>
                    <label for="reps">Reps:</label>
                    <input type="number" id="reps" min="0">
                </div>
                <div class="form-group" id="setsGroup" hidden>
                    <label for="sets">Sets:</label>
                    <input type="number" id="sets" min="0">
                </div>
                <div class="form-group" id="weightGroup" hidden>
                    <label for="weight">Weight (kg):</label>
                    <input type="number" id="weight" min="0" step="0.1">
                </div>
                <div class="form-group" id="intensityGroup" hidden>
                    <label for="intensity">Intensity:</label>
                    <select id="intensity">
                        <option value= "" disabled selected>Select intensity</option>
                        <option value = "Light">Light</option>
                        <option value = "Moderate">Moderate</option>
                        <option value = "Heavy">Heavy</option>
                    </select>
                </div>
                <div class="form-group" id="durationGroup">
                    <label for="workoutDuration">Duration (minutes):</label>
                    <input type="number" id="workoutDuration" required min="1">
                </div>
                <div class="form-group" id="dateGroup">
                    <label for="workoutDate">Date:</label>
                    <input type="date" id="workoutDate" required>
                </div>
                <div class="modal-actions">
                    <button type="button" id="closeModalBtn" class="btn-secondary">Cancel</button>
                    <button type="submit" class="btn-primary">Save Workout</button>
                </div>
            </form>
        </div>
    </div>

    <div id="historyModal">
        <div class="history-container">
            <h2>History</h2>
            <div id="workout">
                <p>N/A</p>
            </div>
            <div id="seeMoreBtn">
                <span id="seeMoreLink" style = "text-decoration: underline">See More</span>
            </div>
        </div>
    </div>

    <div id="workoutDisplay" class="modal-overlay hidden">
        <ul id="dailyHistoryList">
        </ul>
    </div>
    <script type="module" src ="js/navbar.js"></script>
    <script type="module" src ="js/home.js"></script>
</body>
</html>
